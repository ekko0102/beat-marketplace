version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: beatmarketplace_db
    environment:
      POSTGRES_DB: beatmarketplace
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: beatmarket2026
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
